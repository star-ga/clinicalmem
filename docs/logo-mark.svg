<?xml version="1.0" encoding="UTF-8"?>
<!--
  ClinicalMem mark — single-color, currentColor.
  STARGA, Inc. 2026 — Apache-2.0.

  Concept (read inside-out):
    1. Inner medical cross (universal clinical signal)
    2. Six rounded petals around the cross = the 6 safety layers
    3. Outer broken ring = the audit chain (segments = TAG_v1 records)
    4. Two hash marks at top-right = the SHA-256 repro_hash signature

  Designed at 48x48 viewBox so it pixel-snaps cleanly at common sizes
  (16, 24, 32, 48, 96). Uses `fill="currentColor"` everywhere so the
  parent element's CSS color tints the entire mark — no per-deployment
  palette work required.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"
     fill="currentColor" stroke="none" role="img"
     aria-label="ClinicalMem — clinical safety memory">
  <title>ClinicalMem</title>

  <!-- Outer audit-chain ring (6 segments + 6 gaps; each gap = a record boundary) -->
  <g opacity="0.88">
    <path d="M24 4 a20 20 0 0 1 17.32 10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M44 22 a20 20 0 0 1 -2.68 12"  fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M37.32 38 a20 20 0 0 1 -10.66 5.86" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M21.34 43.86 a20 20 0 0 1 -10.66 -5.86" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M6.68 34 a20 20 0 0 1 -2.68 -12"  fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M6.68 14 a20 20 0 0 1 17.32 -10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Hash signature at top-right (SHA-256 audit chain) -->
  <g opacity="0.7">
    <line x1="38" y1="9"  x2="42" y2="9"  stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="38" y1="12" x2="42" y2="12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="40.5" y1="6.5" x2="39.5" y2="14.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- Six safety-layer petals around the cross.
       Each petal = a layer of the pipeline; rotated in 60° increments. -->
  <g opacity="0.18">
    <g transform="translate(24 24)">
      <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      <g transform="rotate(60)">
        <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      </g>
      <g transform="rotate(120)">
        <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      </g>
      <g transform="rotate(180)">
        <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      </g>
      <g transform="rotate(240)">
        <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      </g>
      <g transform="rotate(300)">
        <path d="M0 -14 a4 4 0 0 1 4 6 a4 4 0 0 1 -8 0 a4 4 0 0 1 4 -6 z"/>
      </g>
    </g>
  </g>

  <!-- Center medical cross — bold, the focal mark.
       Rounded ends so it reads as friendly clinical, not aggressive ER.
  -->
  <rect x="20" y="14" width="8" height="20" rx="2.4"/>
  <rect x="14" y="20" width="20" height="8" rx="2.4"/>

  <!-- Tiny verification dot at top of the cross =
       "this decision is bit-identically reproducible".
  -->
  <circle cx="24" cy="11" r="1.6" opacity="0.9"/>
</svg>

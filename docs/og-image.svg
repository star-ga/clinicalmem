<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ClinicalMem — Auditable BitNet b1.58 Drug-Safety Memory for Healthcare AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="55%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#FFE8DD"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top-left brand mark + wordmark -->
  <g transform="translate(70 70)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#0F766E"/>
    <text x="28" y="38" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" text-anchor="middle" fill="#F0FDFA">C</text>
    <text x="78" y="38" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#0F766E">ClinicalMem</text>
    <text x="78" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#475569">v4.1.0 · Apache-2.0 · STARGA, Inc.</text>
  </g>

  <!-- Headline -->
  <g transform="translate(70 200)">
    <text font-family="ui-serif, Georgia, serif" font-size="68" font-weight="800" fill="#0F172A">
      <tspan x="0" y="0">Auditable drug-safety memory</tspan>
      <tspan x="0" y="78">for healthcare AI agents.</tspan>
    </text>
  </g>

  <!-- Subhead -->
  <text x="70" y="380" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="500" fill="#334155">
    6-layer pipeline · BitNet b1.58 · bit-identical Q16.16 replay
  </text>
  <text x="70" y="416" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#64748B">
    on phone · browser · $15 Pi Zero 2 W · A100 · GB300
  </text>

  <!-- Stat strip -->
  <g transform="translate(70 470)" filter="url(#softShadow)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="246" height="92" rx="14" fill="url(#cardBg)" stroke="#0F766E" stroke-opacity="0.18"/>
    <text x="20" y="32" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#64748B">PCCP COHORT</text>
    <text x="20" y="68" font-family="ui-serif, Georgia, serif" font-size="36" font-weight="800" fill="#16a34a">139 / 139</text>
    <text x="20" y="86" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#475569">100% recall · 0 FP</text>

    <!-- Stat 2 -->
    <rect x="262" y="0" width="246" height="92" rx="14" fill="url(#cardBg)" stroke="#2563eb" stroke-opacity="0.22"/>
    <text x="282" y="32" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#64748B">DETERMINISM</text>
    <text x="282" y="68" font-family="ui-serif, Georgia, serif" font-size="36" font-weight="800" fill="#2563eb">1200 / 1200</text>
    <text x="282" y="86" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#475569">bit-identical Q16.16</text>

    <!-- Stat 3 -->
    <rect x="524" y="0" width="246" height="92" rx="14" fill="url(#cardBg)" stroke="#7c3aed" stroke-opacity="0.22"/>
    <text x="544" y="32" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#64748B">FEDERATION</text>
    <text x="544" y="68" font-family="ui-serif, Georgia, serif" font-size="36" font-weight="800" fill="#7c3aed">21 / 21</text>
    <text x="544" y="86" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#475569">typed invariants PASS</text>

    <!-- Stat 4 -->
    <rect x="786" y="0" width="246" height="92" rx="14" fill="url(#cardBg)" stroke="#FF6B35" stroke-opacity="0.28"/>
    <text x="806" y="32" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#64748B">FOOTPRINT</text>
    <text x="806" y="68" font-family="ui-serif, Georgia, serif" font-size="36" font-weight="800" fill="#FF6B35">148 KB</text>
    <text x="806" y="86" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#475569">A + B BitNet ensemble</text>
  </g>

  <!-- Footer URL -->
  <text x="600" y="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#94a3b8" text-anchor="middle">
    clinicalmem-demo.pages.dev · github.com/star-ga/clinicalmem · huggingface.co/stargainc/clinicalmem-bitnet-b158
  </text>
</svg>

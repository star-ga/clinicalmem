[project]
name = "clinicalmem"
version = "0.1.0"
description = "Persistent, Auditable, Contradiction-Safe Clinical Memory — STARGA Inc."
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "STARGA Inc", email = "noreply@star.ga" }
]
dependencies = [
    "mind-mem>=1.9.0",
    "httpx>=0.27",
    "fastmcp>=2.0",
    "google-adk>=1.0",
    "a2a-sdk>=0.2",
    "uvicorn>=0.30",
    "starlette>=0.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

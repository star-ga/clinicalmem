[project]
name = "clinicalmem"
version = "4.1.0"
description = "Persistent, Auditable, Contradiction-Safe Clinical Memory for Healthcare AI Agents"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "STARGA Inc", email = "noreply@star.ga" }
]
readme = "README.md"
keywords = ["healthcare", "fhir", "mcp", "a2a", "clinical-memory", "drug-interactions", "patient-safety"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://github.com/star-ga/clinicalmem"
Repository = "https://github.com/star-ga/clinicalmem"
"Prompt Opinion" = "https://app.promptopinion.ai/marketplace"
dependencies = [
    "mind-mem>=3.10.5",       # v3.10.5 (released 2026-05-08): fix `# noqa` → `# nosec` for Bandit/GHAS — five suppression comments in mm_cli.py flipped to the syntax Bandit honors so GHAS auto-closes alerts #172-176; no code-behaviour change. v3.10.4 (2026-05-08): mm install-model security hardening (GHAS #165-171) — defense-in-depth URL parse-and-check (https + huggingface.co host required), absolute-path resolution for ollama via shutil.which, --model regex validation `[A-Za-z0-9._-]+\.gguf`. v3.10.3 (2026-05-08): mm install-model subcommand + GGUF model installation flow. v3.10.2 (released 2026-05-08): canonical Memory Protocol system-prompt snippet auto-injected on `mm install-all` for codex/vibe/cursor/windsurf/cline/roo (closes hallucination gap discovered during sibling-product audit — wiring MCP without instructing the LLM to call mcp__mind-mem__recall produced bad behavior). New MEMORY_PROTOCOL_SNIPPET constant in hook_installer.py + docs/agent-memory-protocol.md added. v3.10.x line is hook-installer + CLI + docs only — NO new transport/federation/network/peer module, no clinicalmem federation_transport.py wiring needed. v3.10.1 (released 2026-05-07 late-evening): adds Vibe (Mistral CLI) MCP auto-wire — _merge_mcp_vibe_toml writer in hook_installer.py for Vibe's flat mcp_servers = [...] array shape; AGENT_REGISTRY entry mcp_fmt=mcp-toml-vibe + mcp_path_tmpl=~/.vibe/config.toml. All 9 detected MCP-aware clients (Claude Code, Codex, Gemini, Cursor, Windsurf, Roo, OpenClaw, Continue, Vibe) now auto-wired by mm install-all --force. NO new transport/federation/network/peer module — installer plumbing only, no clinicalmem federation_transport.py wiring needed. v3.10.0 (2026-05-07): mind-mem-4b v3.10.2-fullft hits 6/6 eval gate (55/55 probes) + GGUF Q4_K_M Ollama build + corpus surgeries (signal_stats fix, drift_detect hallucination removal) + training-pipeline tooling (chunked-parallel runpod_deploy). v3.9.1 (2026-05-05): doc + train-tooling alignment release on top of v3.9.0. v3.9.0 baseline (2026-05-04): HTTP transport (single-workspace REST adapter for non-MCP clients) + daemon + inbox ingestion + hash-of-code pipeline invalidation + persona projection + walkthrough compilation + replicated postgres backend + 4 v3.9 MCP tool wrappers. Federation control plane (peer registry + 7 sync scopes + LWW/governance-gated conflict resolution + sync audit log + EventFanout) unchanged from v3.8.14 — http_transport.py single-workspace, NOT P2P federation; mock queue stays for cross-machine bytes per JUDGES.md "Honest limitations" #3 until a dedicated MIC@2 transport adapter ships in a future mind-mem release. v3.0.0+ baseline: SQLCipher at-rest encryption, TAG_v1 audit-integrity, tier-decay. See docs/why_mind_mem_v3.md.
    "httpx>=0.27",
    "fastmcp>=2.0",
    "google-adk>=1.0",
    "a2a-sdk>=0.2",
    "uvicorn>=0.30",
    "starlette>=0.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

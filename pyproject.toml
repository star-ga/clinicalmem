[project]
name = "clinicalmem"
version = "4.1.0"
description = "Persistent, Auditable, Contradiction-Safe Clinical Memory for Healthcare AI Agents"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "STARGA Inc", email = "noreply@star.ga" }
]
readme = "README.md"
keywords = ["healthcare", "fhir", "mcp", "a2a", "clinical-memory", "drug-interactions", "patient-safety"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://github.com/star-ga/clinicalmem"
Repository = "https://github.com/star-ga/clinicalmem"
"Prompt Opinion" = "https://app.promptopinion.ai/marketplace"
dependencies = [
    "mind-mem>=3.10.0",       # v3.10.0 (released 2026-05-07): mind-mem-4b v3.10.2-fullft hits 6/6 eval gate (55/55 probes) + GGUF Q4_K_M Ollama build + corpus surgeries (signal_stats fix, drift_detect hallucination removal) + training-pipeline tooling (chunked-parallel runpod_deploy). NO new transport/federation/network/peer module in src/mind_mem/ — only __init__.py version bump diff vs 3.9.1. v3.9.1 (2026-05-05): doc + train-tooling alignment release on top of v3.9.0. Surfaces the v3.9.0 reality: 81 MCP tools (was 77 in v3.8.14 era), 4000+ pytest suite, mind-mem-4b reframed as full fine-tune of Qwen3.5-4B (was QLoRA). train/runpod_deploy.py + build_model_card.py + upload_to_hf.py + eval_harness.py updated for full-FT path. NO runtime / src/mind_mem/ module changes — no clinicalmem federation_transport.py wiring needed. v3.9.0 baseline (released 2026-05-04): HTTP transport (single-workspace REST adapter for non-MCP clients) + daemon + inbox ingestion + hash-of-code pipeline invalidation + persona projection + walkthrough compilation + replicated postgres backend + 4 v3.9 MCP tool wrappers. Federation control plane (peer registry + 7 sync scopes + LWW/governance-gated conflict resolution + sync audit log + EventFanout) is unchanged from v3.8.14 — http_transport.py is single-workspace, NOT P2P federation; mock queue stays for cross-machine bytes per JUDGES.md "Honest limitations" #3 until the dedicated transport adapter ships in v3.10. v3.0.0+ baseline: SQLCipher at-rest encryption, TAG_v1 audit-integrity, tier-decay. See docs/why_mind_mem_v3.md.
    "httpx>=0.27",
    "fastmcp>=2.0",
    "google-adk>=1.0",
    "a2a-sdk>=0.2",
    "uvicorn>=0.30",
    "starlette>=0.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "mind-mem>=1.9.0" "httpx>=0.27" "fastmcp>=2.0" \
            "uvicorn>=0.30" "starlette>=0.40" "google-adk>=1.0" \
            "a2a-sdk>=0.2" pytest respx

      - name: Run tests
        run: python -m pytest tests/ -v

name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # a2a-sdk pinned to 0.3.24 because post-1.0.0 PyPI dropped 'In' symbol
          pip install "a2a-sdk==0.3.24"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
